root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/hello-cards ."
  bin = "./tmp/hello-cards"
  include_ext = ["go", "tpl", "tmpl", "templ", "html"]
  exclude_dir = ["tmp", ".git"]
  exclude_regex = ["_test\\.go$", "_templ\\.go$"]
  delay = 200
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true

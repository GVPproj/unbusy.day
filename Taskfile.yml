version: "3"

dotenv: [".env"]

# Tailwind standalone binary (ADR 0008 / PRD). Pinned here the way the templ CLI
# is pinned in go.mod/Dockerfile/CI — bump in this var, the Dockerfile, and CI
# together. go.mod can't hold a non-Go binary, so the Taskfile is the anchor.
vars:
  TAILWIND_VERSION: 4.3.1
  TAILWIND_BIN: tmp/tailwindcss
  TAILWIND_IN: internal/frontend/input.css
  TAILWIND_OUT: internal/frontend/static/output.css

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  dev:
    desc: "templ watch/proxy driving the Go server over a local SQLite file (browse :7331)"
    cmds:
      # No external DB: DATABASE_URL points at a local SQLite file (.env). The
      # app migrates on boot, so no separate migrate step is needed here.
      # templ owns the whole dev loop: it watches .templ and .go files,
      # regenerates, (re)runs the server, and auto-reloads the browser via
      # the proxy on :7331. Text-only .templ edits (CSS in styles.templ,
      # copy) skip the rebuild/restart entirely — the running server re-reads
      # literals from _templ.txt per render (TEMPL_DEV_MODE, set by the CLI)
      # and the proxy just reloads the page. Go-affecting changes restart
      # `go run .`. Don't run air alongside this; it rebuilds on every
      # .templ edit and defeats the fast path.
      # The proxy opens the root, which the Datastar page serves — but we wait
      # out the startup 502s (curl -f) before opening so the first load isn't
      # a stale error page.
      # Tailwind --watch runs alongside templ, regenerating output.css on .templ
      # edits. It writes a plain .css file, so it never triggers a Go rebuild —
      # templ's text-only fast path stays intact. In a watch session
      # (TEMPL_DEV_MODE) StaticHandler serves static/ from disk, not the embedded
      # copy, so the rewritten output.css is live on the browser reload templ
      # fires — a new utility class lands without a Go rebuild.
      - |
        (i=0; until curl -sf -o /dev/null http://127.0.0.1:7331/ || [ $i -ge 100 ]; do i=$((i+1)); sleep 0.2; done; open "http://127.0.0.1:7331/") &
        {{.TAILWIND_BIN}} -i {{.TAILWIND_IN}} -o {{.TAILWIND_OUT}} --watch &
        templ generate --watch --proxy="http://localhost:${PORT:-8080}" --open-browser=false --cmd="go run ./cmd/unbusy"
    deps: [tailwind:install]

  tailwind:install:
    desc: "Download the pinned Tailwind v4 standalone binary into tmp/ (no Node)"
    status:
      - test -x {{.TAILWIND_BIN}} && {{.TAILWIND_BIN}} --help 2>&1 | grep -q "v{{.TAILWIND_VERSION}}"
    cmds:
      - |
        os=$(uname -s | tr '[:upper:]' '[:lower:]'); [ "$os" = darwin ] && os=macos
        arch=$(uname -m); [ "$arch" = aarch64 ] && arch=arm64; [ "$arch" = x86_64 ] && arch=x64
        mkdir -p tmp
        curl -sL -o {{.TAILWIND_BIN}} \
          "https://github.com/tailwindlabs/tailwindcss/releases/download/v{{.TAILWIND_VERSION}}/tailwindcss-${os}-${arch}"
        chmod +x {{.TAILWIND_BIN}}

  css:
    desc: "Generate the embedded utility stylesheet (output.css)"
    deps: [tailwind:install]
    cmds:
      - "{{.TAILWIND_BIN}} -i {{.TAILWIND_IN}} -o {{.TAILWIND_OUT}} --minify"

  migrate:
    desc: "Apply pending migrations against $DATABASE_URL (goose, run-once)"
    cmds:
      - go run ./cmd/unbusy migrate

  templ:
    desc: "Generate templ Go files"
    # Don't run this while `task dev` is up: non-watch `templ generate` deletes
    # the watch session's $TMPDIR/templ_*.txt literals, so the running dev
    # server 500s on every render until you restart it. `go test`/CI are
    # unaffected (they use the literals compiled into *_templ.go).
    cmds:
      - templ generate

  build:
    desc: "Build the Go binary"
    deps: [templ, css]
    cmds:
      - go build -o tmp/unbusy ./cmd/unbusy

  test:
    desc: "Run Go tests and JS unit tests"
    cmds:
      - go test ./...
      - node --test internal/frontend/jstest/*.test.js

  fmt:
    desc: "Format Go code"
    cmds:
      - go fmt ./...

  nuke:
    desc: "Delete the local SQLite file (and WAL sidecars); next run re-migrates"
    cmds:
      # Strip the file: scheme and ?query from the DSN, then remove the db plus
      # its -wal/-shm sidecars. App recreates and migrates on next boot.
      - |
        db="${DATABASE_URL#file:}"; db="${db%%\?*}"
        rm -f "$db" "$db-wal" "$db-shm"

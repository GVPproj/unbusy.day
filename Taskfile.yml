version: "3"

dotenv: [".env"]

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  dev:
    desc: "Postgres (compose) + templ watch/proxy driving the Go server (browse :7331)"
    cmds:
      - docker compose up -d --wait
      # templ owns the whole dev loop: it watches .templ and .go files,
      # regenerates, (re)runs the server, and auto-reloads the browser via
      # the proxy on :7331. Text-only .templ edits (CSS in styles.templ,
      # copy) skip the rebuild/restart entirely — the running server re-reads
      # literals from _templ.txt per render (TEMPL_DEV_MODE, set by the CLI)
      # and the proxy just reloads the page. Go-affecting changes restart
      # `go run .`. Don't run air alongside this; it rebuilds on every
      # .templ edit and defeats the fast path.
      # The proxy opens the root, which the Datastar page serves — but we wait
      # out the startup 502s (curl -f) before opening so the first load isn't
      # a stale error page.
      - |
        (i=0; until curl -sf -o /dev/null http://127.0.0.1:7331/ || [ $i -ge 100 ]; do i=$((i+1)); sleep 0.2; done; open "http://127.0.0.1:7331/") &
        templ generate --watch --proxy="http://localhost:8080" --open-browser=false --cmd="go run ."

  up:
    desc: "Start local Postgres in the background"
    cmds:
      - docker compose up -d --wait

  down:
    desc: "Stop local Postgres (keeps volume)"
    cmds:
      - docker compose down

  nuke:
    desc: "Stop Postgres and delete the data volume"
    prompt: "This will erase local dev data. Continue?"
    cmds:
      - docker compose down -v

  migrate:
    desc: "Apply pending migrations against $DATABASE_URL (goose, run-once)"
    cmds:
      - go run . migrate

  templ:
    desc: "Generate templ Go files"
    # Don't run this while `task dev` is up: non-watch `templ generate` deletes
    # the watch session's $TMPDIR/templ_*.txt literals, so the running dev
    # server 500s on every render until you restart it. `go test`/CI are
    # unaffected (they use the literals compiled into *_templ.go).
    cmds:
      - templ generate

  build:
    desc: "Build the Go binary"
    deps: [templ]
    cmds:
      - go build -o tmp/hello-cards .

  test:
    desc: "Run Go tests"
    cmds:
      - go test ./...

  fmt:
    desc: "Format Go code"
    cmds:
      - go fmt ./...

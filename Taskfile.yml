version: "3"

dotenv: [".env"]

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  dev:
    desc: "Postgres (compose) + templ watch/proxy driving the Go server (browse :7331)"
    cmds:
      - docker compose up -d --wait
      # templ owns the whole dev loop: it watches .templ and .go files,
      # regenerates, (re)runs the server, and auto-reloads the browser via
      # the proxy on :7331. Text-only .templ edits (CSS in styles.templ,
      # copy) skip the rebuild/restart entirely — the running server re-reads
      # literals from _templ.txt per render (TEMPL_DEV_MODE, set by the CLI)
      # and the proxy just reloads the page. Go-affecting changes restart
      # `go run .`. Don't run air alongside this; it rebuilds on every
      # .templ edit and defeats the fast path.
      # templ always opens the proxy root (no flag to pick a path), and the
      # server has no "/" route, so we suppress its auto-open and open /ds/
      # ourselves once the proxy serves it (curl -f waits out the 502s
      # while `go run .` starts up).
      - |
        (i=0; until curl -sf -o /dev/null http://127.0.0.1:7331/ds/ || [ $i -ge 100 ]; do i=$((i+1)); sleep 0.2; done; open "http://127.0.0.1:7331/ds/") &
        templ generate --watch --proxy="http://localhost:8080" --open-browser=false --cmd="go run ."

  dev:fe:
    desc: "Vite dev server (FE1) with /api proxy to :8080"
    dir: frontend
    cmds:
      - pnpm dev

  up:
    desc: "Start local Postgres in the background"
    cmds:
      - docker compose up -d --wait

  down:
    desc: "Stop local Postgres (keeps volume)"
    cmds:
      - docker compose down

  nuke:
    desc: "Stop Postgres and delete the data volume"
    prompt: "This will erase local dev data. Continue?"
    cmds:
      - docker compose down -v

  migrate:
    desc: "Apply SQL migrations against $DATABASE_URL (psql)"
    cmds:
      - |
        for f in migrations/*.sql; do
          [ -f "$f" ] || continue
          echo "→ $f"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
        done

  templ:
    desc: "Generate templ Go files (FE2)"
    cmds:
      - templ generate

  build:
    desc: "Build the Go binary"
    deps: [templ]
    cmds:
      - go build -o tmp/hello-cards .

  test:
    desc: "Run Go and frontend tests"
    cmds:
      - go test ./...
      - cd frontend && pnpm test

  fmt:
    desc: "Format Go code"
    cmds:
      - go fmt ./...

version: "3"

# versions.env is the single source of truth for non-Go tool versions
# ($TAILWIND_VERSION); the Dockerfile and CI read the same file. templ's version
# lives in go.mod (derived via `go list -m`). `task check:versions` flags drift.
dotenv: [".env", "versions.env"]

vars:
  TAILWIND_BIN: tmp/tailwindcss
  TAILWIND_IN: internal/frontend/input.css
  TAILWIND_OUT: internal/frontend/static/output.css

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  dev:
    desc: "templ watch/proxy driving the Go server over a local SQLite file (browse :7331)"
    cmds:
      # templ owns the dev loop: watches .templ/.go, regenerates, (re)runs the
      # server, and reloads the browser via the proxy on :7331. Text-only .templ
      # edits skip rebuild/restart (server re-reads literals per render under
      # TEMPL_DEV_MODE); Go changes restart `go run .`. Don't run air alongside —
      # it rebuilds on every .templ edit and defeats the fast path.
      # We wait out startup 502s (curl -f) before opening the browser.
      # Tailwind --watch regenerates output.css on .templ edits; it writes plain
      # CSS so it never triggers a Go rebuild, and TEMPL_DEV_MODE serves static/
      # from disk, so new utility classes land live without a rebuild.
      - |
        opener=open; command -v xdg-open >/dev/null && opener=xdg-open
        (i=0; until curl -sf -o /dev/null http://127.0.0.1:7331/ || [ $i -ge 100 ]; do i=$((i+1)); sleep 0.2; done; "$opener" "http://127.0.0.1:7331/") &
        {{.TAILWIND_BIN}} -i {{.TAILWIND_IN}} -o {{.TAILWIND_OUT}} --watch &
        templ generate --watch --proxy="http://localhost:${PORT:-8080}" --open-browser=false --cmd="go run ./cmd/unbusy"
    deps: [tailwind:install]

  tailwind:install:
    desc: "Download the pinned Tailwind v4 standalone binary into tmp/ (no Node)"
    status:
      - test -x {{.TAILWIND_BIN}} && {{.TAILWIND_BIN}} --help 2>&1 | grep -q "v$TAILWIND_VERSION"
    cmds:
      - |
        os=$(uname -s | tr '[:upper:]' '[:lower:]'); [ "$os" = darwin ] && os=macos
        arch=$(uname -m); [ "$arch" = aarch64 ] && arch=arm64; [ "$arch" = x86_64 ] && arch=x64
        mkdir -p tmp
        curl -sL -o {{.TAILWIND_BIN}} \
          "https://github.com/tailwindlabs/tailwindcss/releases/download/v$TAILWIND_VERSION/tailwindcss-${os}-${arch}"
        chmod +x {{.TAILWIND_BIN}}

  css:
    desc: "Generate the embedded utility stylesheet (output.css)"
    deps: [tailwind:install]
    cmds:
      - "{{.TAILWIND_BIN}} -i {{.TAILWIND_IN}} -o {{.TAILWIND_OUT}} --minify"

  check:versions:
    desc: "Compare pinned tool/CDN versions against latest upstream releases"
    cmds:
      - |
        set -eu
        # Latest release tag from the GitHub API / npm registry (drop leading v).
        gh_latest() { curl -fsSL "https://api.github.com/repos/$1/releases/latest" \
          | sed -nE 's/.*"tag_name": *"v?([^"]+)".*/\1/p'; }
        npm_latest() { curl -fsSL "https://registry.npmjs.org/$1/latest" \
          | sed -nE 's/.*"version": *"([^"]+)".*/\1/p'; }
        # Newest tag (for repos that publish tags but no GitHub releases).
        gh_tag() { curl -fsSL "https://api.github.com/repos/$1/tags" \
          | sed -nE 's/.*"name": *"v?([^"]+)".*/\1/p' | head -1; }
        report() { # name pinned latest
          if [ "$2" = "$3" ]; then printf '  ✓ %-11s %s (up to date)\n' "$1" "$2";
          else printf '  ✗ %-11s pinned %s, latest %s\n' "$1" "$2" "$3"; rc=1; fi; }
        rc=0
        report templ "$(go list -m github.com/a-h/templ | awk '{print $2}' | sed 's/^v//')" "$(gh_latest a-h/templ)"
        report tailwind "$TAILWIND_VERSION" "$(gh_latest tailwindlabs/tailwindcss)"
        report ds-sdk "$(go list -m github.com/starfederation/datastar-go | awk '{print $2}' | sed 's/^v//')" "$(gh_tag starfederation/datastar-go)"
        # Datastar client bundle: a CDN tag in the templ shells (both must agree).
        ds_client=$(grep -rhoE 'datastar@v[0-9.]+' internal/frontend/smoke.templ internal/frontend/layouts/layout.templ | sed 's/.*@v//' | sort -u)
        if [ "$(printf '%s' "$ds_client" | grep -c .)" -gt 1 ]; then
          printf '  ✗ %-11s tags disagree across templ files: %s\n' ds-client "$(echo $ds_client)"; rc=1
        else report ds-client "$ds_client" "$(gh_latest starfederation/datastar)"; fi
        report motion "$(grep -hoE 'motion@[0-9.]+' internal/frontend/static/drag.js | sed 's/.*@//')" "$(npm_latest motion)"
        exit $rc

  migrate:
    desc: "Apply pending migrations against $DATABASE_URL (goose, run-once)"
    cmds:
      - go run ./cmd/unbusy migrate

  templ:
    desc: "Generate templ Go files"
    # Don't run while `task dev` is up: non-watch generation deletes the watch
    # session's literal cache, 500ing the dev server until restart. CI/test are
    # unaffected (they use literals compiled into *_templ.go).
    cmds:
      - templ generate

  build:
    desc: "Build the Go binary"
    deps: [templ, css]
    cmds:
      - go build -o tmp/unbusy ./cmd/unbusy

  test:
    desc: "Run Go tests and JS unit tests"
    cmds:
      - go test ./...
      - node --test internal/frontend/jstest/*.test.js

  fmt:
    desc: "Format Go code"
    cmds:
      - go fmt ./...

  nuke:
    desc: "Delete the local SQLite file (and WAL sidecars); next run re-migrates"
    cmds:
      # Strip the file: scheme and ?query from the DSN, then remove the db and
      # its -wal/-shm sidecars.
      - |
        db="${DATABASE_URL#file:}"; db="${db%%\?*}"
        rm -f "$db" "$db-wal" "$db-shm"

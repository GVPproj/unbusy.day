name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      # Local SQLite file (ADR 0007) — no DB container. The driver won't create
      # the parent dir, so the tmp/ step below makes it before migrate.
      DATABASE_URL: file:./tmp/unbusy.db?_pragma=foreign_keys(1)&_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)&_txlock=immediate

    steps:
      - uses: actions/checkout@v4

      - name: Create db dir
        run: mkdir -p tmp

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # CLI version derived from the go.mod runtime (single source of truth) —
      # a CLI/runtime mismatch can't happen (same approach as the Dockerfile).
      - name: Install templ
        run: go install "github.com/a-h/templ/cmd/templ@$(go list -m github.com/a-h/templ | awk '{print $2}')"

      # *_templ.go is git-ignored and regenerated in the Docker build; CI must
      # generate before vet/build/test so the package compiles.
      - name: Generate templ
        run: templ generate

      - name: Apply migrations
        run: go run ./cmd/unbusy migrate

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      # Pure-logic JS units (the push cascade, ADR 0005) — runner's node, no deps.
      - name: Test JS
        run: node --test internal/frontend/jstest/*.test.js

  deploy:
    name: Deploy (Fly)
    needs: test
    runs-on: ubuntu-latest
    # Only deploy real pushes to main — never on PRs or forks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # One deploy at a time; don't cancel a deploy mid-flight.
    concurrency:
      group: deploy-fly
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Config lives in fly.app.toml (not the default fly.toml) per the repo
      # layout. The Dockerfile runs `templ generate` itself, so no templ here.
      - name: Deploy
        run: flyctl deploy --config fly.app.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

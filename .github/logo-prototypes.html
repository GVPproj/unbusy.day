<!doctype html>
<!-- PROTOTYPE — the full "unbusy.day" cursive wordmark (variant A), shown plain and as a true
     pixel rendering in the pixelarticons idiom (integer grid, 1-cell line weight, filled rect
     runs, staircase curves), on mock GitHub README panels in light + dark.
     First real use: the GitHub README header. Open directly: `open .github/logo-prototypes.html`.
     Delete this file once the design is settled (fold the winner into .github/ as an svg). -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>unbusy.day wordmark prototypes</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #57534e;
    padding: 2rem 1rem 7rem;
  }
  .panels { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; max-width: 1200px; margin: 0 auto; }
  /* mock GitHub README, light + dark */
  .readme {
    flex: 1 1 460px; max-width: 560px;
    border-radius: 12px; padding: 3rem 2.5rem 2.5rem;
    text-align: center;
    font-family: -apple-system, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  }
  .readme.light { background: #ffffff; color: #1f2328; border: 1px solid #d1d9e0; }
  .readme.dark  { background: #0d1117; color: #f0f6fc; border: 1px solid #3d444d; }
  .readme .logo { margin: 0 auto 1.4rem; }
  .readme .badges { display: flex; gap: 6px; justify-content: center; margin: 0 0 1rem; }
  .readme .badges span {
    font: 600 11px/1.9 Verdana, sans-serif; padding: 0 8px; border-radius: 3px;
    background: #555; color: #fff;
  }
  .readme .badges span b { color: #4c1; font-weight: 600; }
  .readme p { font-size: 15px; line-height: 1.5; }
  .readme.light p { color: #59636e; }
  .readme.dark  p { color: #9198a1; }

  .sway {
    animation: sway 5.9s ease-in-out infinite;
    transform-origin: center;
    display: inline-block;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1.8deg) translateY(0) scale(1.02, 0.98); }
    25%      { transform: rotate(0deg) translateY(-2px) scale(0.99, 1.01); }
    50%      { transform: rotate(1.8deg) translateY(0) scale(1.02, 0.98); }
    75%      { transform: rotate(0deg) translateY(2px) scale(0.99, 1.01); }
  }
  /* pixel version: no smooth motion — a retro square-wave bob of exactly one on-screen cell */
  .bob { display: inline-block; animation: bob 1.6s steps(1, end) infinite; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(var(--bob, 5px)); }
  }
  @media (prefers-reduced-motion: reduce) { .sway, .bob { animation: none; } }

</style>
</head>
<body>
<div class="panels" id="panels"></div>

<script>
// ---- glyph library ------------------------------------------------------
// Same coordinate system as the ub.d mark: x-height top y=9, baseline y≈20.5,
// ascender top y=4, descenders to ~28. u/b/d/dot are lifted verbatim from
// .github/ub-logo.svg (translated to local origin); n/s/y/a are drafted to match.
// adv = pen advance to the next letter's origin.
const G = {
  u:   { d: 'M0 9 C-1 17, 1 21, 4.5 20.5 C8 20, 10 15, 10.5 9 C10 15, 9.5 20, 12 21 C14 21.8, 16 19, 17 15', adv: 17 },
  n:   { d: 'M0 15 C1 12, 2.5 9.5, 3.5 9 C3 13, 2.5 17.5, 3.5 20.5 C4 16.5, 5.5 11, 8.5 9.5 C11 8.3, 12 10.5, 11.5 14 C11.2 16.3, 11 18.8, 12 20.5 C13 22, 15 19, 16 15', adv: 16 },
  b:   { d: 'M0 15 L3 4 C2 11, 1.5 18, 2.5 20.5 C3.5 23, 8 22, 10 18.5 C12 15, 10 12, 6.5 14 C4.5 15.2, 3 17.5, 2.5 20.5 C3.5 23, 5.5 22.7, 7.5 21.5', adv: 12.5 },
  s:   { d: 'M0 15 C1.4 12.6, 3.4 10.4, 5.4 9.6 C4.6 8.4, 2.6 8.6, 2 10 C1.4 11.6, 2.6 13, 4.4 13.9 C6.6 15, 7.6 16.4, 7 18.3 C6.4 20.2, 4 21.2, 2.4 20.3 C2 21.5, 3.4 21.8, 4.8 21.2 C6.4 20.5, 7.2 18, 7.5 15', adv: 7.5 },
  y:   { d: 'M0 15 C1 12, 2.5 9.5, 3.5 9 C2.5 15.5, 4 20.8, 7 20.5 C10 20.2, 12 15.5, 13 9 C12.5 14, 12.1 18.5, 12.5 22.5 C12.9 26.5, 11 28.7, 8.5 27.8 C6.7 27.1, 6.7 24.8, 8.7 23.2', adv: 15 },
  // word-final y: same skeleton, but a wider bowl and a bigger, deeper descender
  // loop whose tail sweeps back up further — the hand never draws the same letter twice
  y2:  { d: 'M0 15 C1 12.3, 2.7 9.7, 3.7 9 C2.7 15.5, 4.3 20.8, 7.1 20.5 C10.1 20.1, 12.1 15.5, 13 9 C12.3 13.8, 11.9 18.2, 12.7 22.6 C13.5 27.4, 10.6 29.8, 7.8 28.5 C5.5 27.4, 6 24.2, 9.6 22.8', adv: 15 },
  d:   { d: 'M7 14 C6.5 10.8, 1.5 11.2, 0 14.5 C-1.5 18, 1 21.8, 4.3 21 C6.3 20.4, 7.3 17.5, 7.8 14.5 C8.7 11, 9.5 7, 10 4 C9.5 11, 9 18, 10 20.5 C10.5 21.8, 12 21.5, 13 20', adv: 14 },
  a:   { d: 'M7 14 C6.5 10.8, 1.5 11.2, 0 14.5 C-1.5 18, 1 21.8, 4.3 21 C6.3 20.4, 7.3 17.5, 7.8 14.5 C8.1 12.6, 8.4 10.7, 8.6 9 C8.3 13, 8.2 18, 9.2 20.5 C9.9 22, 11.5 19, 12.5 15', adv: 12.5 },
  '.': { d: 'M0 20.5 L0.01 20.5', adv: 5.5 },
};

// The wordmark as glyph keys — the two y's use different variants on purpose.
const WORD = ['u', 'n', 'b', 'u', 's', 'y', '.', 'd', 'a', 'y2'];

// Lay out a glyph sequence; returns { paths: '<path/>…', width }.
function word(glyphs, x0 = 0) {
  let x = x0, paths = '';
  for (const ch of glyphs) {
    const g = G[ch];
    if (ch === '.') x += 3; // dot floats between words like the original mark
    paths += `<path d="${g.d}" transform="translate(${x.toFixed(1)} 0)"/>`;
    x += g.adv;
  }
  return { paths, width: x - x0 };
}

const INK = 'hsl(45, 100%, 40%)';
const STROKE = `stroke="${INK}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"`;
const full = word(WORD);
const PX_PER_UNIT = 400 / (full.width + 8); // plain mark renders 400px wide; pixel marks match

function plainmark() {
  return `
    <svg class="logo sway" viewBox="-4 0 ${(full.width + 8).toFixed(1)} 32" width="400" aria-label="unbusy.day">
      <g ${STROKE}>${full.paths}</g>
    </svg>`;
}

// ---- pixel feeling ------------------------------------------------------
// True pixel rendering in the pixelarticons idiom (studied from
// halfmage/pixelarticons svg source — clock, zap, moon, heart, reload):
//   - hard integer grid; line weight is uniformly ONE grid cell
//     (theirs: 2px modules on a 24px icon — the grid IS the stroke)
//   - filled axis-aligned rects only; fill, never stroke, no anti-aliasing
//   - the whole mark is one merged <path> of M…h…v1h…z runs
//   - curves become staircases; 45° runs are corner-touching squares
// We rasterize the same cursive centerlines onto the grid, so plain and
// pixel stay one drawing at two resolutions. `cell` is in glyph units:
// smaller cell = finer grid (x-height ≈ 11.5 units → 11.5/cell cells tall).

// Sample the M/C/L glyph paths densely (a point every ~`step` units).
function samplePath(d, step) {
  const tok = d.match(/[MCL]|-?[\d.]+/g);
  const pts = [];
  let i = 0, cur = null;
  while (i < tok.length) {
    const cmd = tok[i++];
    if (cmd === 'M') { cur = { x: +tok[i++], y: +tok[i++] }; pts.push({ ...cur }); }
    else if (cmd === 'L') {
      const p = { x: +tok[i++], y: +tok[i++] };
      const n = Math.max(1, Math.ceil(Math.hypot(p.x - cur.x, p.y - cur.y) / step));
      for (let k = 1; k <= n; k++) pts.push({ x: cur.x + (p.x - cur.x) * k / n, y: cur.y + (p.y - cur.y) * k / n });
      cur = p;
    } else if (cmd === 'C') {
      const p1 = { x: +tok[i++], y: +tok[i++] }, p2 = { x: +tok[i++], y: +tok[i++] }, p3 = { x: +tok[i++], y: +tok[i++] };
      const chord = Math.hypot(p1.x - cur.x, p1.y - cur.y) + Math.hypot(p2.x - p1.x, p2.y - p1.y) + Math.hypot(p3.x - p2.x, p3.y - p2.y);
      const n = Math.max(4, Math.ceil(chord / step));
      for (let k = 1; k <= n; k++) {
        const t = k / n, u = 1 - t;
        pts.push({
          x: u * u * u * cur.x + 3 * u * u * t * p1.x + 3 * u * t * t * p2.x + t * t * t * p3.x,
          y: u * u * u * cur.y + 3 * u * u * t * p1.y + 3 * u * t * t * p2.y + t * t * t * p3.y,
        });
      }
      cur = p3;
    }
  }
  return pts;
}

function pixelmark(cell) {
  // rasterize: mark every grid cell the pen passes through
  const byRow = new Map();
  let pen = 0, minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
  for (const ch of WORD) {
    const g = G[ch];
    if (ch === '.') pen += 3;
    for (const p of samplePath(g.d, cell / 4)) {
      const cx = Math.floor((p.x + pen) / cell), cy = Math.floor(p.y / cell);
      if (!byRow.has(cy)) byRow.set(cy, new Set());
      byRow.get(cy).add(cx);
      minX = Math.min(minX, cx); maxX = Math.max(maxX, cx);
      minY = Math.min(minY, cy); maxY = Math.max(maxY, cy);
    }
    pen += g.adv;
  }
  // emit horizontal runs as one merged pixelarticons-style path, in cell units
  let d = '';
  for (const cy of [...byRow.keys()].sort((a, b) => a - b)) {
    const xs = [...byRow.get(cy)].sort((a, b) => a - b);
    for (let i = 0; i < xs.length;) {
      let j = i;
      while (j + 1 < xs.length && xs[j + 1] === xs[j] + 1) j++;
      d += `M${xs[i]} ${cy}h${j - i + 1}v1h${-(j - i + 1)}z`;
      i = j + 1;
    }
  }
  const w = maxX - minX + 3, h = maxY - minY + 3; // 1-cell padding all round
  const cellPx = cell * PX_PER_UNIT;
  return `
    <svg class="logo bob" style="--bob: ${cellPx.toFixed(1)}px; shape-rendering: crispEdges"
         viewBox="${minX - 1} ${minY - 1} ${w} ${h}" width="${Math.round(w * cellPx)}" aria-label="unbusy.day">
      <path fill="${INK}" d="${d}"/>
    </svg>`;
}

const ROWS = [
  { name: 'plain', html: plainmark() },
  { name: 'pixel (cell 1.25)', html: pixelmark(1.25) },
];
document.getElementById('panels').innerHTML = ROWS.map(row => ['light', 'dark'].map(theme => `
  <div class="readme ${theme}">
    <div class="logo">${row.html}</div>
    <!-- row label is page chrome, not part of the design -->
    <div style="font: 11px ui-monospace, monospace; opacity: .45; margin: -0.9rem 0 0.9rem">${row.name}</div>
    <div class="badges"><span>CI/CD <b>passing</b></span><span>go report <b>A+</b></span><span>go 1.24</span></div>
    <p>Have a structured day. Time-block your schedule, track some progress, no rush.</p>
  </div>`).join('')).join('');
</script>
</body>
</html>

<!DOCTYPE html>
<!-- Source for .github/readme-types.png (the README's three-block-types
     figure), echoing the guide modal's .guide-types list. Transparent canvas
     so it sits on GitHub's light and dark themes alike.
     Regenerate at 2x then downscale:
       chrome - -headless - -screenshot=types-2x.png - -window-size=760,320 \
         - -force-device-scale-factor=2 - -hide-scrollbars \
         - -default-background-color=00000000 \
         - -allow-file-access-from-files docs/readme-types.html
       sips -z 320 760 types-2x.png - -out .github/readme-types.png
     (join the "- -" pairs into double-dash flags; HTML comments forbid them) -->
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "Zen Maru Gothic";
    font-weight: 400;
    src: url("../internal/frontend/static/fonts/zen-maru-gothic-400-latin.woff2") format("woff2");
  }
  @font-face {
    font-family: "Zen Maru Gothic";
    font-weight: 700;
    src: url("../internal/frontend/static/fonts/zen-maru-gothic-700-latin.woff2") format("woff2");
  }

  :root {
    /* solarized-light tokens from app.css */
    --bg: hsl(44, 86%, 94%);
    --ink: hsl(195, 7%, 32%);
    --column-bg: hsl(46, 42%, 88%);
    --rail-border: hsl(44, 27%, 79%);
    --type-deep: hsl(205, 70%, 87%);
    --type-shallow: var(--bg);
    --type-break: hsl(135, 42%, 82%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 760px;
    height: 320px;
    overflow: hidden;
    font-family: "Zen Maru Gothic", sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel {
    background: var(--column-bg);
    border-radius: 16px;
    padding: 34px 44px;
    box-shadow:
      0 14px 36px rgba(0, 20, 26, 0.28),
      0 3px 10px rgba(0, 20, 26, 0.18);
    display: grid;
    gap: 24px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 26px;
    color: var(--ink);
    line-height: 1.3;
  }
  .swatch {
    flex: none;
    width: 52px;
    height: 36px;
    border-radius: 8px;
    border: 2px solid var(--rail-border);
    box-shadow: 0 1px 2px rgba(88, 110, 117, 0.3);
  }
  .swatch.deep    { background: var(--type-deep); }
  .swatch.shallow { background: var(--type-shallow); }
  .swatch.break   { background: var(--type-break); }
</style>
</head>
<body>
  <div class="panel">
    <div class="row"><span class="swatch deep"></span><span><strong>Deep</strong> — distraction-free work</span></div>
    <div class="row"><span class="swatch shallow"></span><span><strong>Shallow</strong> — meetings, &ldquo;checking things&rdquo;</span></div>
    <div class="row"><span class="swatch break"></span><span><strong>Break</strong> — plan these! &ldquo;Guitar&rdquo;? &ldquo;Pizza&rdquo;?</span></div>
  </div>
</body>
</html>

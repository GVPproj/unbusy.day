<!DOCTYPE html>
<!-- Source for .github/readme-types.png (the README's four-block-types
     figure), echoing the guide modal's .guide-types list. Transparent canvas
     so it sits on GitHub's light and dark themes alike.
     Regenerate at 2x then downscale:
       chromium - -headless - -screenshot=types-2x.png - -window-size=760,320 \
         - -force-device-scale-factor=2 - -hide-scrollbars \
         - -default-background-color=00000000 \
         - -allow-file-access-from-files docs/readme-types.html
       convert types-2x.png -resize 760x320 .github/readme-types.png
     (join the "- -" pairs into double-dash flags; HTML comments forbid them) -->
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "Zen Maru Gothic";
    font-weight: 400;
    src: url("../internal/frontend/static/fonts/zen-maru-gothic-400-latin.woff2") format("woff2");
  }
  @font-face {
    font-family: "Zen Maru Gothic";
    font-weight: 700;
    src: url("../internal/frontend/static/fonts/zen-maru-gothic-700-latin.woff2") format("woff2");
  }

  :root {
    /* catppuccin-mocha tokens from app.css */
    --bg: hsl(240, 21%, 15%);
    --ink: hsl(227, 63%, 92%);
    --column-bg: hsl(240, 21%, 12%);
    --rail-border: hsl(235, 13%, 31%);
    --type-deep: hsl(217, 50%, 30%);
    --type-shallow: hsl(237, 16%, 23%);
    --type-break: hsl(189, 45%, 24%);
    --type-appointment: hsl(350, 40%, 26%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 760px;
    height: 320px;
    overflow: hidden;
    font-family: "Zen Maru Gothic", sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel {
    background: var(--column-bg);
    border-radius: 16px;
    padding: 34px 44px;
    box-shadow:
      0 14px 36px rgba(17, 17, 27, 0.45),
      0 3px 10px rgba(17, 17, 27, 0.3);
    display: grid;
    gap: 24px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 26px;
    color: var(--ink);
    line-height: 1.3;
  }
  .swatch {
    flex: none;
    width: 52px;
    height: 36px;
    border-radius: 8px;
    border: 2px solid var(--rail-border);
    box-shadow: 0 1px 2px rgba(17, 17, 27, 0.4);
  }
  .swatch.deep        { background: var(--type-deep); }
  .swatch.shallow     { background: var(--type-shallow); }
  .swatch.break       { background: var(--type-break); }
  .swatch.appointment { background: var(--type-appointment); }
</style>
</head>
<body>
  <div class="panel">
    <div class="row"><span class="swatch deep"></span><span><strong>Focus</strong> — undistracted effort</span></div>
    <div class="row"><span class="swatch shallow"></span><span><strong>Admin</strong> — chat, light tasks</span></div>
    <div class="row"><span class="swatch break"></span><span><strong>Break</strong> — take regularly</span></div>
    <div class="row"><span class="swatch appointment"></span><span><strong>Fixed</strong> — appointments, meetings</span></div>
  </div>
</body>
</html>

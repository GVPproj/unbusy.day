# Local dev Postgres only. Production uses Neon (PRD D2).
# Dummy creds — never reuse (PRD S2). DATABASE_URL is in .env.

services:
  postgres:
    image: postgres:16-alpine
    container_name: hello-cards-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hello_cards
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hello_cards"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pgdata:

# Fly app config. Named fly.app.toml (not fly.toml) per repo layout; pass with
# `fly deploy -c fly.app.toml`.
#
# Single always-on machine in sjc. The SQLite file lives on a Fly volume
# mounted at /data (ADR 0007); durability is Fly's scheduled volume snapshots
# for now. Continuous streaming backup (Litestream) is deferred —
# docs/backlog/002. In-process pub/sub + the single-writer SQLite file are
# single-machine by design (ADR 0003) — keep exactly one machine running;
# never enable auto-stop or scale >1.
app            = "hello-cards"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  # SQLite file on the mounted volume, with the same pragmas as local dev (WAL,
  # busy_timeout, foreign_keys, immediate write-txn locking).
  # flyctl warns that DATABASE_URL "may be sensitive" — false positive: it
  # matches the name, not the value. This is a credential-free local file path,
  # not a network DSN, so it stays in [env] (self-documenting) rather than a secret.
  DATABASE_URL = "file:/data/unbusy.db?_pragma=foreign_keys(1)&_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)&_txlock=immediate"

# The volume holding the SQLite file. Create once in the app's region with:
#   fly volumes create data -c fly.app.toml --size 1
[mounts]
  source      = "data"
  destination = "/data"

# Rolling deploys: on drain in-flight SSE streams close cleanly and clients
# recover via EventSource auto-reconnect + Last-Event-ID. With a single machine
# "rolling" still means a brief origin gap while the machine is replaced —
# clients ride it out the same way. No release_command: migrations run on boot
# in the app process, the machine that mounts the volume (ADR 0007). A separate
# release machine can't see the volume, so boot-time migration is the only
# place schema can land against the real file.
[deploy]
  strategy = "rolling"

[http_service]
  internal_port       = 8080
  force_https         = true
  # Never stop the machine: in-process pub/sub lives in memory and a stop would
  # drop every open EventSource. Single always-on machine by design.
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  # SSE (/events) is long-lived. Fly's proxy streams it as long as data flows;
  # the 25s :keepalive keeps idle conns warm. No per-route timeout knob exists
  # in fly.toml — the app disables WriteTimeout itself (main.go) and manages
  # liveness via keepalive.

  # Fly health check on /healthz: a pure in-process 200 with no DB query — a
  # liveness probe only.
  [[http_service.checks]]
    path         = "/healthz"
    method       = "GET"
    interval     = "15s"
    timeout      = "2s"
    grace_period = "10s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
